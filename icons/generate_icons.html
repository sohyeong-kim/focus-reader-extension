<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <h3>아래 캔버스들을 우클릭해서 PNG로 저장하세요:</h3>
  <p>icon16.png:</p>
  <canvas id="c16" width="16" height="16"></canvas>
  <p>icon48.png:</p>
  <canvas id="c48" width="48" height="48"></canvas>
  <p>icon128.png:</p>
  <canvas id="c128" width="128" height="128"></canvas>
  
  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      // 배경
      ctx.fillStyle = '#4A90D9';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.15);
      ctx.fill();
      // 책 이모지
      ctx.font = size * 0.65 + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('📖', size/2, size/2);
    }
    drawIcon(document.getElementById('c16'), 16);
    drawIcon(document.getElementById('c48'), 48);
    drawIcon(document.getElementById('c128'), 128);
  </script>
</body>
</html>
