<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Mint background with rounded corners -->
  <rect width="200" height="200" rx="40" fill="#9DFFD5"/>
  
  <!-- Pomeranian head -->
  <circle cx="100" cy="95" r="45" fill="#F4A460"/>
  
  <!-- Fluffy fur details -->
  <circle cx="65" cy="80" r="25" fill="#F4A460"/>
  <circle cx="135" cy="80" r="25" fill="#F4A460"/>
  <circle cx="75" cy="110" r="20" fill="#F4A460"/>
  <circle cx="125" cy="110" r="20" fill="#F4A460"/>
  <circle cx="100" cy="125" r="22" fill="#F4A460"/>
  
  <!-- Ears -->
  <ellipse cx="65" cy="60" rx="15" ry="25" fill="#D4894F" transform="rotate(-20 65 60)"/>
  <ellipse cx="135" cy="60" rx="15" ry="25" fill="#D4894F" transform="rotate(20 135 60)"/>
  
  <!-- Face -->
  <circle cx="100" cy="95" r="35" fill="#F5DEB3"/>
  
  <!-- Snout -->
  <ellipse cx="100" cy="105" rx="18" ry="15" fill="#FFE4B5"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="108" rx="8" ry="6" fill="#333"/>
  
  <!-- Mouth -->
  <path d="M 100 108 Q 95 113 90 111" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M 100 108 Q 105 113 110 111" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Glasses frame -->
  <g stroke="#2C3E50" stroke-width="3" fill="none">
    <!-- Left lens -->
    <circle cx="85" cy="88" r="16" fill="rgba(255,255,255,0.3)"/>
    <!-- Right lens -->
    <circle cx="115" cy="88" r="16" fill="rgba(255,255,255,0.3)"/>
    <!-- Bridge -->
    <line x1="101" y1="88" x2="99" y2="88" stroke-width="3"/>
    <!-- Left temple -->
    <path d="M 69 88 Q 60 88 55 92"/>
    <!-- Right temple -->
    <path d="M 131 88 Q 140 88 145 92"/>
  </g>
  
  <!-- Eyes behind glasses -->
  <circle cx="85" cy="88" r="6" fill="#333"/>
  <circle cx="115" cy="88" r="6" fill="#333"/>
  
  <!-- Eye highlights -->
  <circle cx="87" cy="86" r="2" fill="#FFF"/>
  <circle cx="117" cy="86" r="2" fill="#FFF"/>
  
  <!-- Book/paper icon (to show it's about reading) -->
  <g transform="translate(140, 140)">
    <rect x="0" y="0" width="35" height="28" rx="2" fill="#FFF" stroke="#2C3E50" stroke-width="2"/>
    <line x1="5" y1="8" x2="30" y2="8" stroke="#2C3E50" stroke-width="1.5"/>
    <line x1="5" y1="14" x2="30" y2="14" stroke="#2C3E50" stroke-width="1.5"/>
    <line x1="5" y1="20" x2="25" y2="20" stroke="#2C3E50" stroke-width="1.5"/>
  </g>
</svg>