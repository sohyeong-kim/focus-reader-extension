<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        h2 {
            margin: 0 0 12px;
            font-size: 16px;
            color: #58a6ff;
        }
        .section {
            margin-bottom: 16px;
            padding: 12px;
            background: #252540;
            border-radius: 8px;
        }
        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #888;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 12px;
            box-sizing: border-box;
        }
        select {
            cursor: pointer;
        }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #58a6ff;
            color: #000;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-secondary {
            background: #404060;
            color: #e0e0e0;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
        }
        .status-dot.online {
            background: #22c55e;
        }
        .status-dot.offline {
            background: #ef4444;
        }
        .cache-info {
            font-size: 12px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 8px;
        }
        .button-group button {
            flex: 1;
        }
        .hint {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
        .hint a {
            color: #58a6ff;
            text-decoration: none;
        }
        .hint a:hover {
            text-decoration: underline;
        }
        .coffee-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #FFDD00 0%, #FFB800 100%);
            border-radius: 8px;
            text-decoration: none;
            color: #000;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .coffee-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 221, 0, 0.4);
        }
        .coffee-banner img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <h2>🐶 ADHD Focus Reader</h2>
    
    <!-- Buy Me a Coffee -->
    <a href="https://buymeacoffee.com/thgud1624" target="_blank" class="coffee-banner">
        ☕ Buy Me a Coffee - Support this project!
    </a>
    
    <!-- API Key (for OpenAI TTS) -->
    <div class="section" id="api-key-section">
        <label>🔑 OpenAI API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
        <button class="btn-primary" id="save-key" style="margin-top:8px">💾 Save</button>
        <div class="hint" style="margin-top:8px; font-size:11px;">
            Required for audio mode. Get your key at<br>
            <a href="https://platform.openai.com/api-keys" target="_blank" style="color:#58a6ff;">platform.openai.com/api-keys</a>
        </div>
    </div>
    
    <!-- Cache -->
    <div class="section">
        <label>💾 Audio Cache</label>
        <div class="cache-info" id="cache-info">Checking...</div>
        <div class="button-group">
            <button class="btn-secondary" id="clear-page-cache">🗑️ This Page</button>
            <button class="btn-danger" id="clear-all-cache">🗑️ Clear All</button>
        </div>
    </div>
    
    <div class="hint">
        💡 Alt+R: Reading mode<br>
        ⬅️➡️ Navigate sentences | ⬆️⬇️ Navigate paragraphs
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
