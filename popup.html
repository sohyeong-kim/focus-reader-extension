<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        h2 {
            margin: 0 0 12px;
            font-size: 16px;
            color: #58a6ff;
        }
        .section {
            margin-bottom: 16px;
            padding: 12px;
            background: #252540;
            border-radius: 8px;
        }
        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #888;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 12px;
            box-sizing: border-box;
        }
        select {
            cursor: pointer;
        }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #58a6ff;
            color: #000;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-secondary {
            background: #404060;
            color: #e0e0e0;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
        }
        .status-dot.online {
            background: #22c55e;
        }
        .status-dot.offline {
            background: #ef4444;
        }
        .cache-info {
            font-size: 12px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 8px;
        }
        .button-group button {
            flex: 1;
        }
        .hint {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
        .tts-option {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tts-option:hover {
            background: #333355;
        }
        .tts-option.selected {
            background: #404070;
            border: 1px solid #58a6ff;
        }
        .tts-option input[type="radio"] {
            width: auto;
            margin-right: 10px;
        }
        .tts-option-info {
            flex: 1;
        }
        .tts-option-name {
            font-size: 13px;
            font-weight: 500;
        }
        .tts-option-desc {
            font-size: 11px;
            color: #888;
        }
        .tts-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .badge-free {
            background: #22c55e;
            color: #000;
        }
        .badge-premium {
            background: #f59e0b;
            color: #000;
        }
        .service-status {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .service-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <h2>📖 Focus Reader</h2>
    
    <!-- TTS Engine Selection -->
    <div class="section">
        <label>🎙️ TTS Engine</label>
        
        <div class="tts-option" data-engine="kokoro">
            <input type="radio" name="tts-engine" value="kokoro" id="tts-kokoro">
            <div class="tts-option-info">
                <div class="tts-option-name">
                    Kokoro TTS
                    <span class="tts-badge badge-free">FREE</span>
                </div>
                <div class="tts-option-desc">Local AI voice (requires Docker)</div>
            </div>
        </div>
        
        <div class="tts-option" data-engine="openai">
            <input type="radio" name="tts-engine" value="openai" id="tts-openai">
            <div class="tts-option-info">
                <div class="tts-option-name">
                    OpenAI TTS
                    <span class="tts-badge badge-premium">PREMIUM</span>
                </div>
                <div class="tts-option-desc">High quality (requires API key)</div>
            </div>
        </div>
        
        <div class="tts-option" data-engine="browser">
            <input type="radio" name="tts-engine" value="browser" id="tts-browser">
            <div class="tts-option-info">
                <div class="tts-option-name">
                    Browser TTS
                    <span class="tts-badge badge-free">FREE</span>
                </div>
                <div class="tts-option-desc">Built-in browser voice</div>
            </div>
        </div>
    </div>
    
    <!-- Service Status -->
    <div class="section">
        <label>📡 Service Status</label>
        <div class="service-status">
            <div class="service-item">
                <div class="status-dot" id="spacy-dot"></div>
                <span>spaCy</span>
            </div>
            <div class="service-item">
                <div class="status-dot" id="kokoro-dot"></div>
                <span>Kokoro</span>
            </div>
        </div>
    </div>
    
    <!-- API Key (for OpenAI) -->
    <div class="section" id="api-key-section">
        <label>🔑 OpenAI API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
        <button class="btn-primary" id="save-key" style="margin-top:8px">💾 Save</button>
    </div>
    
    <!-- Cache -->
    <div class="section">
        <label>💾 Audio Cache</label>
        <div class="cache-info" id="cache-info">Checking...</div>
        <div class="button-group">
            <button class="btn-secondary" id="clear-page-cache">🗑️ This Page</button>
            <button class="btn-danger" id="clear-all-cache">🗑️ Clear All</button>
        </div>
    </div>
    
    <div class="hint">
        💡 Alt+R: Reading mode<br>
        ⬅️➡️ Navigate sentences | ⬆️⬇️ Navigate paragraphs
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
